services:
  web:
    container_name: carsbay
    build: .
    # apt-get update && apt-get install -y lsb-release && apt-get clean all
    # command: python manage.py runserver 0.0.0.0:8000
    command: daphne -b 0.0.0.0 -p 8000 carsbay_project.asgi:application
    volumes:
      - carsbay_web:/usr/src/code/
    expose:
      - 8000
    env_file:
      - ./carsbay_project/.env
    depends_on:
      - redis

    # Redis
  redis:
    container_name: redis
    image: redis:alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

  # PostgreSQL
  db:
    image: postgres:16
    container_name: carsbay_data
    volumes:
      - carsbay_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=carsbay_data

  nginx:
    build: ./nginx
    ports:
      - 1337:80
    depends_on:
      - web

volumes:
  carsbay_data:
  carsbay_web:
  redis_data:
